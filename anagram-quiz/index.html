<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Anagram Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="questionBank.js"></script>
    <script src="script.js" defer></script>
</head>

<body>

    <div class="quiz-container">
        <div class="quiz-card" id="quizCard">
            <div id="game" class="game">
                <div class="quiz-icon">🧠</div>
                <div id="question" class="question"></div>
                <div id="anagram" class="anagram"></div>
                <div id="answer" class="anagram answer"></div>
                <button id="nextBtn" class="next-btn">Next Question ➜</button>
            </div>

            <div id="endOfGame" class="endOfGame">
                <div class="endOfGameText">--END of Game--</div>
                <button id="restartGame" class="restartGame">Restart ➜</button>
            </div>

        </div>
    </div>

</body>

</html>

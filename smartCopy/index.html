<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Manager</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/1688b3edf6.js"></script>
</head>

<body>
    <div class="container mt-4 app-container">
        <h1 class="title">📋 Clipboard Manager</h1>

        <!-- FULL WIDTH AUTOFOCUS -->
        <textarea id="clipboardInput" autofocus placeholder="Paste something here..."></textarea>

        <!-- FULL WIDTH SEARCH + ACTION -->
        <div class="controls-row mb-2">
            <input type="text" id="searchInput" placeholder="🔍 Search..." class="search-box">

            <div class="action-buttons">
                <span class="action-label">Actions:</span>

                <!-- FLOATING GO TO BOTTOM -->
                <!-- <button id="printToConsole" class="btn btn-info btn-sm">printToConsole</button>
                <button id="addDummy" class="btn btn-info btn-sm">Add Dummy Data</button> -->
                <button id="deleteAll" class="btn btn-danger btn-sm">Delete All</button>
                <button id="deleteExceptToday" class="btn btn-warning btn-sm">Delete Except Today</button>

            </div>
        </div>
        <div class="table-container">
            <table id="clipboardTable" class="custom-table">
                <thead>
                    <tr>
                        <th class="col-no">No.</th>
                        <th class="col-content">Content</th>
                        <th class="col-tag"><i class="fa-solid fa-tags"></i> Tag</th>
                        <th class="col-date">Date</th>
                        <th class="col-actions">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>


        <!-- GO TO TOP (LONG BUTTON) -->
        <button id="goTopBtn" class="go-top-btn">⬆ Go To Top</button>

        <div class="end-divider">
            <span>End of Page</span>
        </div>
    </div>

    <script src="script.js"></script>

    <div id="copyToast" class="custom-toast">
        Copied successfully ✅
    </div>


</body>

</html>
